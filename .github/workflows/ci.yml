name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  models: read
jobs:
  # ──── Stage 1: Lint & Format ────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip (lint)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: lint-${{ runner.os }}-pip-ruff
          restore-keys: lint-${{ runner.os }}-pip-

      - name: Install linters
        run: pip install ruff

      - name: Check linting
        run: ruff check src/

      - name: Check formatting
        run: ruff format --check src/

  # ──── Stage 2: Unit Tests ────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip (test)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: test-${{ runner.os }}-pip-${{ hashFiles('requirements-test.txt') }}
          restore-keys: test-${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-test.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ──── Stage 3: Benchmark (main branch only) ────
  benchmark:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Cache 1: pip packages ─────────────────────────────────────────
      - name: Cache pip (benchmark)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: benchmark-${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: benchmark-${{ runner.os }}-pip-

      # ── Cache 2: Python bytecode (__pycache__) ────────────────────────
      - name: Cache Python bytecode
        uses: actions/cache@v4
        with:
          path: |
            src/**/__pycache__
            .pytest_cache
          key: pycache-${{ runner.os }}-py311-${{ hashFiles('src/**/*.py') }}
          restore-keys: pycache-${{ runner.os }}-py311-

      # ── Cache 3: previous benchmark outputs ──────────────────────────
      # Key covers OCR text + prompt + schema: any change to inputs
      # invalidates the cache and forces a fresh run.
      # New models with no cached JSON run normally; already-extracted
      # models are loaded from disk via --skip-existing.
      - name: Restore benchmark output cache
        uses: actions/cache@v4
        with:
          path: data/processed/benchmark_output
          key: bench-out-${{ runner.os }}-${{ hashFiles('data/processed/pipeline_output/text/**', 'prompts/**', 'schema/**') }}
          restore-keys: bench-out-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y poppler-utils tesseract-ocr

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── Run benchmark ─────────────────────────────────────────────────
      # No --models flag: the script reads ALL_MODELS and auto-skips any
      # model whose API key env var is missing (no secret = no run).
      # --skip-existing: models with a cached JSON file in benchmark_output/
      # are loaded from disk — no API call made, scores re-computed vs GT.
      # To add a new model: add it to ALL_MODELS / HF_MODELS in
      # llm_models_extraction.py and add the matching repo secret.
      - name: Run benchmark (all available models)
        run: |
          python src/extraction/llm_models_extraction.py \
            --use-cached-ocr \
            --skip-existing \
            --ground-truth data/ground_truth/diler-07-07-2025-rerun-41-44_gt.json \
            --output data/processed/benchmark_output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        timeout-minutes: 45

      # ── Render Quarto benchmark report ───────────────────────────────
      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render benchmark report
        run: quarto render benchmark_report.qmd
        continue-on-error: true

      - name: Upload benchmark results + report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results-${{ github.sha }}
          path: |
            data/processed/benchmark_output/
            benchmark_report.html
          retention-days: 90
          if-no-files-found: warn

  # ──── Stage 4: Docker Build ────
  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: mtc-extraction-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
